apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets-api
  labels:
    app: tickets-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tickets-api
  template:
    metadata:
      labels:
        app: tickets-api
    spec:
      containers:
        - name: tickets-api
          image: your-registry/tickets-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: tickets-database
                  key: host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: tickets-database
                  key: port
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tickets-database
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tickets-database
                  key: password
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: tickets-database
                  key: database
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: tickets-redis
                  key: host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: tickets-redis
                  key: port
            - name: RESERVATION_TTL_SECONDS
              value: "600"
            - name: RESERVATION_LOCK_TTL_MS
              value: "5000"
            - name: WEBHOOK_PAYMENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tickets-secrets
                  key: webhookPaymentSecret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tickets-secrets
                  key: jwtSecret
            - name: JWT_EXPIRES_IN
              value: "1d"
          readinessProbe:
            httpGet:
              path: /catalog/test
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

